<!DOCTYPE html>
<html lang="es" class="bg-brand-bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaN Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: "#0e0c15",
              surface: "#1a1727",
              border: "#2d2843",
              accent: "#7c3aed",
              "accent-h": "#6d28d9",
              text: "#f1f5f9",
              muted: "#94a3b8",
              error: "#ef4444",
            },
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', "monospace"],
            sans: ["Inter", "sans-serif"],
            display: ['"Plus Jakarta Sans"', "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="min-h-screen bg-brand-bg text-brand-text font-sans antialiased leading-relaxed">

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center">
    <div class="bg-brand-surface border border-brand-border rounded-xl p-8 flex flex-col items-center gap-4">
      <svg class="spinner w-10 h-10 text-brand-accent" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
      </svg>
      <p class="text-brand-muted text-sm">Generando examen...</p>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Login view -->
  <div id="view-login" class="flex flex-col items-center justify-center min-h-screen gap-8 px-4">
    <div class="text-center">
      <h1 class="font-mono text-3xl font-semibold tracking-tight">
        <span class="text-brand-accent">NaN</span> Quiz Generator
      </h1>
      <p class="text-brand-muted text-sm mt-2">Genera exámenes a partir de tus apuntes</p>
    </div>
    <div id="google-signin-button"></div>
    <div id="login-error" class="hidden text-brand-error text-sm"></div>
  </div>

  <!-- App layout -->
  <div id="app-layout" class="hidden flex flex-col h-screen">
    <!-- Topbar -->
    <header class="h-14 bg-brand-surface border-b border-brand-border flex items-center justify-between px-4 shrink-0 z-40">
      <div class="flex items-center gap-3">
        <button id="sidebar-toggle" class="text-brand-muted hover:text-brand-text transition-colors" title="Menú lateral">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
        </button>
        <span class="font-mono text-sm font-semibold text-brand-accent">NaN Quiz</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="user-email" class="text-xs text-brand-muted truncate max-w-[180px]"></span>
        <button id="logout-btn" class="text-xs text-brand-muted hover:text-brand-text transition-colors whitespace-nowrap">Cerrar sesión</button>
      </div>
    </header>
    <!-- Body: sidebar + main -->
    <div class="flex flex-1 overflow-hidden relative">
      <!-- Sidebar -->
      <aside id="sidebar" class="bg-brand-surface border-r border-brand-border flex flex-col shrink-0 overflow-hidden transition-all duration-200 z-30 max-md:fixed max-md:inset-y-0 max-md:left-0 max-md:-translate-x-full">
        <!-- Scrollable subject list -->
        <div id="sidebar-content" class="flex-1 overflow-y-auto p-3">
          <div class="space-y-1">
            <div class="flex items-center justify-between px-2 py-2">
              <h2 class="font-display text-sm font-semibold text-brand-text">Tus asignaturas</h2>
            </div>
            <div id="subjects-list" class="space-y-1">
            </div>
            <div id="sidebar-empty" class="hidden text-xs text-brand-muted text-center py-4 px-2">Aún no tienes asignaturas</div>
          </div>
        </div>
        <!-- Create subject form -->
        <div class="p-3 border-t border-brand-border">
          <div class="flex gap-2">
            <input id="new-subject-input" type="text" placeholder="Nombre de la asignatura" class="flex-1 bg-brand-bg border border-brand-border rounded-lg px-3 py-2 text-sm text-brand-text placeholder-brand-muted/50 focus:ring-2 focus:ring-brand-accent focus:border-brand-accent outline-none transition-all" />
            <button id="create-subject-btn" class="bg-brand-accent hover:bg-brand-accent-h text-white text-sm px-3 py-2 rounded-lg transition-colors whitespace-nowrap shrink-0">Crear asignatura</button>
          </div>
        </div>
      </aside>
      <!-- Backdrop for mobile sidebar -->
      <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/50 z-20 md:hidden"></div>
      <!-- Main content -->
      <main id="main-content" class="flex-1 overflow-y-auto p-6">
      </main>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
